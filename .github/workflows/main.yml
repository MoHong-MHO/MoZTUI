name: Full Matrix CI (Linux + Android + Alpine + macOS)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ==================== A 分区 ====================
          - zone: A
            platform: linux-amd64
            os: ubuntu-latest
            cc: gcc
            cflags: "-fPIC -Wall -O2"
            make_target: TARGET=libtui.so DEMO=demo
            artifact_name: tui-linux-amd64
            bin_ext: ""
            lib_ext: so
            extra_pkgs: ""

          - zone: A
            platform: linux-arm64
            os: ubuntu-latest
            cc: aarch64-linux-gnu-gcc
            cflags: "-fPIC -Wall -O2"
            make_target: TARGET=libtui.so DEMO=demo
            artifact_name: tui-linux-arm64
            bin_ext: ""
            lib_ext: so
            extra_pkgs: "gcc-aarch64-linux-gnu"

          - zone: A
            platform: macos-arm64
            os: macos-latest
            cc: gcc
            cflags: "-fPIC -Wall -O2"
            make_target: TARGET=libtui.dylib DEMO=demo
            artifact_name: tui-macos-arm64
            bin_ext: ""
            lib_ext: dylib
            extra_pkgs: ""

          # ==================== B 分区 ====================
          - zone: B
            platform: linux-x86
            os: ubuntu-latest
            cc: gcc
            cflags: "-fPIC -Wall -O2 -m32"
            make_target: TARGET=libtui.so DEMO=demo
            artifact_name: tui-linux-x86
            bin_ext: ""
            lib_ext: so
            extra_pkgs: "gcc-multilib g++-multilib libc6-dev-i386"

          - zone: B
            platform: linux-arm32
            os: ubuntu-latest
            cc: arm-linux-gnueabihf-gcc
            cflags: "-fPIC -Wall -O2 -march=armv7-a -mfloat-abi=hard"
            make_target: TARGET=libtui.so DEMO=demo
            artifact_name: tui-linux-arm32
            bin_ext: ""
            lib_ext: so
            extra_pkgs: "gcc-arm-linux-gnueabihf binutils-arm-linux-gnueabihf"

          - zone: B
            platform: android-arm64
            os: ubuntu-latest
            cc: aarch64-linux-android21-clang
            cflags: "-fPIC -Wall -O2"
            make_target: TARGET=libtui.so DEMO=demo
            artifact_name: tui-android-arm64
            bin_ext: ""
            lib_ext: so
            extra_pkgs: ""
            android: true

          - zone: B
            platform: android-armv7
            os: ubuntu-latest
            cc: armv7a-linux-androideabi21-clang
            cflags: "-fPIC -Wall -O2"
            make_target: TARGET=libtui.so DEMO=demo
            artifact_name: tui-android-armv7
            bin_ext: ""
            lib_ext: so
            extra_pkgs: ""
            android: true

          # ==================== C 分区 ====================
          - zone: C
            platform: alpine-x64
            os: ubuntu-latest
            cc: musl-gcc
            cflags: "-fPIC -Wall -O2 -static"
            make_target: TARGET=libtui.a DEMO=demo-static
            artifact_name: tui-alpine-x64
            bin_ext: ""
            lib_ext: a
            extra_pkgs: "musl-tools"
            alpine: true

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install base tools
        run: sudo apt-get update && sudo apt-get install -y build-essential make

      - name: Install extra packages
        if: matrix.extra_pkgs != ''
        run: sudo apt-get install -y ${{ matrix.extra_pkgs }}

      - name: Setup Android SDK
        if: matrix.android == true
        uses: android-actions/setup-android@v3

      - name: Install NDK 25
        if: matrix.android == true
        run: |
          sdkmanager "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Add NDK toolchain to PATH
        if: matrix.android == true
        run: echo "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Setup Alpine toolchain
        if: matrix.alpine == true
        run: |
          sudo apt-get install -y musl-tools
          sudo ln -sf /usr/bin/musl-gcc /usr/local/bin/gcc

      - name: Build
        working-directory: ./tui
        run: |
          make CC="${{ matrix.cc }}" CFLAGS="${{ matrix.cflags }}" ${{ matrix.make_target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ./tui/libtui.${{ matrix.lib_ext }}
            ./tui/demo${{ matrix.bin_ext }}

      - name: Auto Release (Nightly)
        if: matrix.platform == 'linux-amd64'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly-${{ github.run_number }}
          name: "Nightly Build #${{ github.run_number }}"
          body: |
            Build artifacts:
            - A: Linux x86_64/ARM64, macOS ARM64
            - B: Linux x86/ARM32, Android
            - C: Alpine (static)
            Commit: ${{ github.sha }}
          draft: false
          prerelease: true
          files: |
            ./tui/libtui.so
            ./tui/demo
