name: Linux Stable CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            cc: gcc
            cflags: "-fPIC -Wall -O2"
            make_target: TARGET=libtui.so DEMO=demo
            artifact_name: tui-linux-amd64
            lib_ext: so
            extra_pkgs: ""

          - platform: linux-arm64
            cc: aarch64-linux-gnu-gcc
            cflags: "-fPIC -Wall -O2"
            make_target: TARGET=libtui.so DEMO=demo
            artifact_name: tui-linux-arm64
            lib_ext: so
            extra_pkgs: "gcc-aarch64-linux-gnu"

          - platform: android-arm64
            cc: aarch64-linux-android21-clang
            cflags: "-fPIC -Wall -O2"
            make_target: TARGET=libtui.so DEMO=demo
            artifact_name: tui-android-arm64
            lib_ext: so
            extra_pkgs: ""
            android: true

          - platform: android-armv7
            cc: armv7a-linux-androideabi21-clang
            cflags: "-fPIC -Wall -O2"
            make_target: TARGET=libtui.so DEMO=demo
            artifact_name: tui-android-armv7
            lib_ext: so
            extra_pkgs: ""
            android: true

          - platform: alpine-x64
            cc: musl-gcc
            cflags: "-fPIC -Wall -O2 -static"
            make_target: TARGET=libtui.a DEMO=demo-static
            artifact_name: tui-alpine-x64
            lib_ext: a
            extra_pkgs: "musl-tools"
            alpine: true

    permissions:
      contents: write

    steps:
      - name: Generate timestamp
        id: ts
        run: echo "time=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4

      - name: Install base tools
        run: sudo apt-get update && sudo apt-get install -y build-essential make

      - name: Install extra packages
        if: matrix.extra_pkgs != ''
        run: sudo apt-get install -y ${{ matrix.extra_pkgs }}

      - name: Setup Android SDK
        if: matrix.android == true
        uses: android-actions/setup-android@v3

      - name: Install NDK 25
        if: matrix.android == true
        run: |
          sdkmanager "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Add NDK toolchain to PATH
        if: matrix.android == true
        run: echo "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Setup Alpine toolchain
        if: matrix.alpine == true
        run: |
          sudo apt-get install -y musl-tools
          sudo ln -sf /usr/bin/musl-gcc /usr/local/bin/gcc

      - name: Build
        working-directory: ./tui
        run: |
          make CC="${{ matrix.cc }}" CFLAGS="${{ matrix.cflags }}" ${{ matrix.make_target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ./tui/libtui.${{ matrix.lib_ext }}
            ./tui/demo*

      - name: Auto Release (Nightly)
        if: matrix.platform == 'linux-amd64'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly-${{ steps.ts.outputs.time }}
          name: "Nightly Build ${{ steps.ts.outputs.time }}"
          body: |
            Verified platforms:
            - Linux: x86_64, ARM64
            - Android: ARM64, ARMv7
            - Alpine: x86_64 (static)
            Commit: ${{ github.sha }}
            Event: ${{ github.event_name }}
          draft: false
          prerelease: true
          files: |
            ./tui/libtui.so
            ./tui/demo
