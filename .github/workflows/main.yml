name: Linux Stable CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            cc: gcc
            cflags: "-fPIC -Wall -O2"
            make_target: TARGET=libtui.so DEMO=demo
            extra_pkgs: ""

          - platform: linux-arm64
            cc: aarch64-linux-gnu-gcc
            cflags: "-fPIC -Wall -O2"
            make_target: TARGET=libtui.so DEMO=demo
            extra_pkgs: "gcc-aarch64-linux-gnu"

          - platform: android-arm64
            cc: aarch64-linux-android21-clang
            cflags: "-fPIC -Wall -O2"
            make_target: TARGET=libtui.so DEMO=demo
            extra_pkgs: ""
            android: true

          - platform: android-armv7
            cc: armv7a-linux-androideabi21-clang
            cflags: "-fPIC -Wall -O2"
            make_target: TARGET=libtui.so DEMO=demo
            extra_pkgs: ""
            android: true

          - platform: alpine-x64
            cc: musl-gcc
            cflags: "-fPIC -Wall -O2 -static"
            make_target: TARGET=libtui.a DEMO=demo-static
            extra_pkgs: "musl-tools"
            alpine: true

    steps:
      - uses: actions/checkout@v4

      - name: Install base tools
        run: sudo apt-get update && sudo apt-get install -y build-essential make

      - name: Install extra packages
        if: matrix.extra_pkgs != ''
        run: sudo apt-get install -y ${{ matrix.extra_pkgs }}

      - name: Setup Android SDK
        if: matrix.android == true
        uses: android-actions/setup-android@v3

      - name: Install NDK 25
        if: matrix.android == true
        run: |
          sdkmanager "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Add NDK toolchain to PATH
        if: matrix.android == true
        run: echo "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Setup Alpine toolchain
        if: matrix.alpine == true
        run: |
          sudo apt-get install -y musl-tools
          sudo ln -sf /usr/bin/musl-gcc /usr/local/bin/gcc

      - name: Build
        working-directory: ./tui
        run: |
          make CC="${{ matrix.cc }}" CFLAGS="${{ matrix.cflags }}" ${{ matrix.make_target }}

      - name: Package into ZIP (per architecture)
        working-directory: ./tui
        run: |
          # 确定生成的文件名（demo 可能带后缀）
          DEMO_FILE=$(ls demo* 2>/dev/null || echo "")
          LIB_FILE=$(ls libtui.* 2>/dev/null || echo "")
          if [ -n "$DEMO_FILE" ] && [ -n "$LIB_FILE" ]; then
            zip MoZTUI-${{ matrix.platform }}.zip "$LIB_FILE" "$DEMO_FILE"
          else
            echo "Error: missing build outputs"
            exit 1
          fi

      - name: Upload ZIP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoZTUI-${{ matrix.platform }}
          path: ./tui/MoZTUI-${{ matrix.platform }}.zip

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main'   # 仅在 main 分支触发
    steps:
      - name: Generate timestamp
        id: ts
        run: echo "time=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Download all ZIP artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List downloaded files
        run: ls -la ./artifacts

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nightly-${{ steps.ts.outputs.time }}
          release_name: "Nightly Build ${{ steps.ts.outputs.time }}"
          body: |
            All architectures:
            - Linux x86_64
            - Linux ARM64
            - Android ARM64
            - Android ARMv7
            - Alpine x86_64 (static)
            Commit: ${{ github.sha }}
          draft: false
          prerelease: true

      - name: Upload all ZIPs to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for zipfile in ./artifacts/MoZTUI-*/MoZTUI-*.zip; do
            if [ -f "$zipfile" ]; then
              echo "Uploading $zipfile ..."
              ASSET_NAME=$(basename "$zipfile")
              curl -L \
                -X POST \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Content-Type: application/zip" \
                --data-binary @"$zipfile" \
                "${{ steps.create_release.outputs.upload_url }}?name=$ASSET_NAME"
            fi
          done
